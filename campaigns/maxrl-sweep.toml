# maxrl-sweep: Does MaxRL + advantage capping break the 47% plateau?
#
# KEY INSIGHT from clip-rescue: GRPO advantages are bounded [-1, +1] with
# binary rewards (A_i = r_i - mean(r)). Advantage capping is guaranteed
# to be a no-op for GRPO.
#
# MaxRL uses A_i = (r_i - mean(r)) / (mean(r) + eps), which gives UNBOUNDED
# advantages for rare correct solutions:
#   1/16 correct → A_correct = 15.0
#   2/16 correct → A_correct = 7.0
#   3/16 correct → A_correct = 4.3
#
# This campaign tests whether:
# H1: MaxRL itself differs from GRPO (different advantage distribution)
# H2: Capping MaxRL's heavy tail changes entropy trajectory
# H3: Capped MaxRL breaks the 47% plateau
#
# 4 conditions x 3 seeds x 100 steps = 12 runs
# See campaigns/EXPERIMENT_THESIS.md for full rationale.
#
# Run: retrain campaigns/maxrl-sweep.toml

[campaign]
seeds = [42, 101, 202]
max_steps = 100
parallel = true
max_workers = 4
stagger_seconds = 10

# C1: GRPO baseline — reference point (should match ~0.468 from clip-rescue)
[[campaign.conditions]]
advantage_mode = "grpo"
transform_mode = "none"

# C2: MaxRL baseline — unbounded advantages, inverse success-rate reweighting
[[campaign.conditions]]
advantage_mode = "maxrl"
transform_mode = "none"

# C3: MaxRL + moderate cap (5.0) — trims extreme upweighting (1-3/16 correct)
[[campaign.conditions]]
advantage_mode = "maxrl"
transform_mode = "none"
adv_clip_max = 5.0

# C4: MaxRL + tight cap (2.0) — aggressive bounding of rare-correct signal
[[campaign.conditions]]
advantage_mode = "maxrl"
transform_mode = "none"
adv_clip_max = 2.0

# --- base training config ---

[backend]
backend = "tinker"

[model]
model = "Qwen/Qwen3-4B-Instruct-2507"
lora_rank = 128

[training]
batch_size = 8
group_size = 16
max_tokens = 2048
temperature = 0.7
lr = 4e-5
save_every = 20

[sepa]
steps = 100
schedule = "linear"
delay_steps = 5

[squeeze]
min_variance_retention = 0.95

[logging]
wandb_project = "maxrl-sweep"
