# Warehouse Phase 2: RL with REINFORCE++ (resume from SFT checkpoint)
#
# Usage:
#   retrain campaigns/warehouse-rl.toml --resume-from logs/warehouse-sft/checkpoint_step_60
#
# Or use the pipeline script for the full staged flow:
#   python campaigns/warehouse_pipeline.py

[backend]
backend = "tinker"

[model]
model = "Qwen/Qwen3-4B-Instruct-2507"
lora_rank = 128

[algorithm]
advantage_mode = "reinforce_pp"
transform_mode = "none"

[training]
seed = 42
max_steps = 200
sft_warmup_steps = 0
batch_size = 4
group_size = 8
max_tokens = 10240
temperature = 0.7
lr = 1e-5
save_every = 20
batch_advantage_norm = true
adv_clip_max = 5.0

[environment]
provider = "verifiers"
id = "soma_warehouse"
max_turns = 15

[environment.args]
num_examples = 16
dataset_seed = 42
max_turns = 15
http_url = "http://127.0.0.1:3000"

[logging]
log_dir = "logs/warehouse-rl"
