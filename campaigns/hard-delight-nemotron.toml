# Nemotron 120B + hard DG (12B active, thinking model)

[campaign]
seeds = [42]
max_steps = 137
parallel = true
max_workers = 3
stagger_seconds = 10

# C1: PG baseline
[[campaign.conditions]]
advantage_mode = "grpo"
transform_mode = "none"
lr = 5e-5

# C2: Hard DG (top-20%, λ=0.5)
[[campaign.conditions]]
advantage_mode = "grpo"
transform_mode = "hard_delight"
lr = 5e-5

[campaign.conditions.transform_params]
delight_k_frac = 0.2
delight_lambda = 0.5

# C3: Hard DG (top-40%, λ=0.5)
[[campaign.conditions]]
advantage_mode = "grpo"
transform_mode = "hard_delight"
lr = 5e-5

[campaign.conditions.transform_params]
delight_k_frac = 0.4
delight_lambda = 0.5

[backend]
backend = "tinker"

[model]
model = "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16"
lora_rank = 64

[training]
batch_size = 8
group_size = 16
max_tokens = 2048
temperature = 0.6
lr = 5e-5
save_every = 25

[sepa]
steps = 137
schedule = "linear"
delay_steps = 2

[logging]
wandb_project = "delight-gate"
