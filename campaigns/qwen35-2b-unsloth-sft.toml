# Standalone Unsloth SFT on Qwen3.5-2B.
#
# This template is a general retrain starting point for users who want to run
# supervised LoRA fine-tuning before optional RL. Fill in sft_data_path with a
# JSONL dataset containing messages, prompt/completion, or text rows. Run
# scripts/smoke_unsloth_sft.py on the target GPU before increasing max_steps or
# max_tokens.

[backend]
backend = "unsloth"
devices = "gpu:0"
adapter_path = "logs/qwen35-2b-unsloth-sft-adapter"

[backend.options]
max_seq_length = 32768
load_in_4bit = true
train_microbatch_size = 1
train_selective_suffix_logits = true
cuda_empty_cache = true
sample_use_cache = true
gradient_checkpointing = true
liger_fused_linear_ce = true
train_unsloth_fused_ce = "auto"
# 0 lets retrain pick a conservative CE chunk target for the detected GPU.
train_unsloth_fused_ce_target_gb = 0.0
train_unsloth_fused_ce_torch_compile = true
qwen35_gated_delta_chunk_size = "auto"

# Exact fallback for very long rows on small GPUs. Keep false for shorter rows
# unless the SFT smoke proves the fused-CE full-context train step OOMs.
train_save_on_cpu = false
train_save_on_cpu_pin_memory = true
train_save_on_cpu_min_numel = 0

# Approximate fallback: crops train-time supervised context before target tokens.
# Leave 0 for exact full-context SFT; set only after an exact smoke cannot fit.
# Dense supervised rows use fused CE when eligible; sparse long-prompt rows
# automatically fall back to selective hidden logprobs. On the measured 12 GB
# 4070 Ti, dense 24k fit and dense 30k did not; sparse 30k fit with a 4096-token
# supervised context window after exact full-context rejection.
train_supervised_context_tokens = 0

# Throughput tuning: after the SFT smoke fits in VRAM, run
# scripts/usl_unsloth_sft_sweep.py. If batch_size > 1 still fits, setting
# train_microbatch_size = 0 lets retrain train the whole SFT batch in one
# microbatch and can remove serial microbatch overhead. On 128-token synthetic
# rows, batch 12 was slightly faster than batch 16 on the measured 12 GB GPU.
# On 30k rows with a 4096-token supervised context window, batch 2 was faster
# with train_microbatch_size = 1; full-batch microbatching was slower and used
# more VRAM.

[model]
model = "Qwen/Qwen3.5-2B"
lora_rank = 32

[training]
trainer = "sft"
seed = 42
max_steps = 100
batch_size = 1
max_tokens = 2048
lr = 2e-5
weight_decay = 0.0
save_every = 20

sft_data_path = "data/sft.jsonl"
sft_batch_size = 1
sft_max_tokens = 2048
sft_loss_fn = "auto"

[logging]
log_dir = "logs/qwen35-2b-unsloth-sft"
