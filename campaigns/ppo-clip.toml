# ppo-clip: PPO ratio clipping on Tinker — the definitive test
#
# THESIS: The 47% plateau is a boom-bust cycle masked by EMA. The model peaks
# at 85% (step ~45) then collapses from unconstrained importance-sampling ratios.
# All advantage-level interventions (MaxRL, capping, SEPA) are null because Adam
# normalizes magnitude. Ratio clipping is the only lever that constrains the
# optimization dynamics directly.
#
# Tinker supports loss_fn="ppo" with built-in clip defaults (custom clip_eps
# via loss_fn_config is not yet supported — returns 500). The PPO loss reports:
#   ppo_mean_ratio, ppo_clipped_fraction, ppo_kl_div
#
# 4 conditions x 3 seeds x 200 steps = 12 runs
#
# Run: uv run retrain campaigns/ppo-clip.toml

[campaign]
seeds = [42, 101, 202]
max_steps = 200
parallel = true
max_workers = 4
stagger_seconds = 10

# C1: No clipping baseline — reproduces boom-bust / ~47% EMA plateau
[[campaign.conditions]]
advantage_mode = "grpo"
transform_mode = "none"
clip_eps = 0.0

# C2: GRPO + PPO clipping — should stabilize training
[[campaign.conditions]]
advantage_mode = "grpo"
transform_mode = "none"
clip_eps = 0.2

# C3: MaxRL + no clipping — reproduces plateau (same as GRPO per previous findings)
[[campaign.conditions]]
advantage_mode = "maxrl"
transform_mode = "none"
clip_eps = 0.0

# C4: MaxRL + PPO clipping — test if MaxRL beats GRPO when training is stable
[[campaign.conditions]]
advantage_mode = "maxrl"
transform_mode = "none"
clip_eps = 0.2

# --- base training config ---

[backend]
backend = "tinker"

[model]
model = "Qwen/Qwen3-4B-Instruct-2507"
lora_rank = 128

[training]
batch_size = 8
group_size = 16
max_tokens = 2048
temperature = 0.7
lr = 5e-5
save_every = 40

[sepa]
steps = 200
schedule = "linear"
delay_steps = 5

[squeeze]
min_variance_retention = 0.95

[logging]
wandb_project = "ppo-clip"
