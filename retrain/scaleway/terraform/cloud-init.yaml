#cloud-config
# Bootstrap for retrain Scaleway GPU instance.
#
# Installs Python deps (torch, vllm) at provision time so the venv
# is ready when retrain rsyncs the project and runs remotely via SSH.
#
# Stack: retrain (local backend) — full training loop on GPU.
#   No PRIME-RL, no ZMQ. retrain is the sole orchestrator.

runcmd:
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - /root/.local/bin/uv venv /opt/retrain-venv --python 3.12
  - /opt/retrain-venv/bin/pip install --upgrade pip -q
  - /opt/retrain-venv/bin/pip install torch --index-url https://download.pytorch.org/whl/cu128 -q
  - /opt/retrain-venv/bin/pip install vllm -q
  - /opt/retrain-venv/bin/pip install huggingface_hub -q
  - /opt/retrain-venv/bin/python -c "from huggingface_hub import snapshot_download; snapshot_download('${model}')"
