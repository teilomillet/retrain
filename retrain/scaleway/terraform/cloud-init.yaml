#cloud-config
# Bootstrap script for the retrain Scaleway GPU instance.
# Templated by Terraform via templatefile() — do not edit outputs directly.
#
# Stack: PRIME-RL (patched vLLM + ZMQ trainer)
#   :8000  inference  (prime-rl vLLM, supports /v1/chat/completions/tokens)
#   :5555  trainer    (PRIME-RL ZMQ transport, receives TrainingBatch from retrain)

write_files:
  - path: /etc/retrain/rl.toml
    content: |
      # Generated by retrain Terraform — do not edit manually.
      [deployment]
      num_train_gpus = ${num_train_gpus}
      num_infer_gpus = ${num_infer_gpus}

      [model]
      name = "${model}"

      [trainer.model.lora]
      rank = ${lora_rank}
      dropout = 0.0
      target_modules = [
          "q_proj", "k_proj", "v_proj", "o_proj",
          "gate_proj", "up_proj", "down_proj"
      ]

      [orchestrator.model.lora]
      name = "retrain-adapter"

      [orchestrator.train.sampling]
      max_completion_tokens = ${max_model_len}

      [ckpt]
    permissions: '0644'

  - path: /etc/systemd/system/retrain-inference.service
    content: |
      [Unit]
      Description=PRIME-RL inference server (vLLM)
      After=network-online.target
      Wants=network-online.target

      [Service]
      WorkingDirectory=/opt/prime-rl
      ExecStart=/root/.local/bin/uv run inference --enable-lora --model.name ${model} --model.max-model-len ${max_model_len} --max-lora-rank ${lora_rank}
      Restart=on-failure
      RestartSec=15
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/retrain-trainer.service
    content: |
      [Unit]
      Description=PRIME-RL trainer (ZMQ transport)
      After=retrain-inference.service
      Wants=network-online.target

      [Service]
      WorkingDirectory=/opt/prime-rl
      ExecStart=/root/.local/bin/uv run rl @ /etc/retrain/rl.toml
      Restart=on-failure
      RestartSec=15
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

runcmd:
  - mkdir -p /etc/retrain
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - source /root/.local/bin/env
  - git clone https://github.com/PrimeIntellect-ai/prime-rl.git /opt/prime-rl
  - cd /opt/prime-rl && /root/.local/bin/uv sync --all-extras
  - systemctl daemon-reload
  - systemctl enable retrain-inference retrain-trainer
  - systemctl start retrain-inference retrain-trainer
