name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install package and quality tooling
        run: |
          uv venv
          uv pip install -e ".[docs]" pytest "ruff==0.15.7" "ty==0.0.24" "ordeal==0.3.39"
      - name: Run ruff
        run: .venv/bin/ruff check retrain tests
      - name: Run staged ty checks
        run: |
          .venv/bin/ty check \
            retrain/type_defs.py \
            retrain/data.py \
            retrain/sepa.py \
            retrain/advantages.py \
            retrain/backend_definitions.py \
            retrain/registry.py \
            retrain/backends.py \
            retrain/trainer.py \
            retrain/prime_rl_backend.py \
            retrain/verifiers_bridge.py \
            --no-progress \
            --output-format concise
      - name: Manual blocks are synced
        run: .venv/bin/retrain man --check
      - name: Build docs (strict)
        run: .venv/bin/mkdocs build --strict
      - name: Run tests
        run: .venv/bin/pytest -q
      - name: Run backend workflow chaos gate
        run: make chaos-backend-workflow
