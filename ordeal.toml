[explorer]
target_modules = [
  "retrain.advantages",
  "retrain.registry",
  "retrain.sepa",
  "retrain.backpressure",
  "retrain.rewards",
  "retrain.config",
  "tests.test_ordeal_backend_workflow",
]
max_time = 60
seed = 42
checkpoint_strategy = "energy"
checkpoint_prob = 0.4
steps_per_run = 50
fault_toggle_prob = 0.3
max_checkpoints = 256
workers = 1
ngram = 2
rule_swarm = true

[[tests]]
class = "tests.test_ordeal_sepa:SEPAControllerChaos"

[[tests]]
class = "tests.test_ordeal_sepa:SEPAAutoScheduleChaos"

[[tests]]
class = "tests.test_ordeal_backpressure:USLBackPressureChaos"

[[tests]]
class = "tests.test_ordeal_trainer_state:TrainerStateChaos"

[[tests]]
class = "tests.test_ordeal_backend_workflow:BackendWorkflowChaos"
steps_per_run = 80
rule_timeout = 5

[report]
format = "both"
output = "ordeal-report.json"
traces = true
traces_dir = ".ordeal/traces"
verbose = true
